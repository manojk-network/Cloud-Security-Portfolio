<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ServerlessFlow Project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>ServerlessFlow ✨</h1>
            <p>AWS Lambda & API Gateway Powered</p>
        </header>

        <main>
            <section class="form-section glass-panel">
                <h2>Create Item</h2>
                <form id="itemForm">
                    <div class="input-group">
                        <label for="itemName">Item Name</label>
                        <input type="text" id="itemName" name="itemName" placeholder="Enter an item name..." required>
                    </div>
                    <button type="submit" class="btn-primary">
                        <span>Save Item</span>
                        <div class="loader hidden" id="saveLoader"></div>
                    </button>
                </form>
            </section>

            <section class="list-section glass-panel">
                <h2>Item Collection</h2>
                <div class="list-controls">
                    <button id="refreshBtn" class="btn-secondary">
                        Refresh List
                    </button>
                </div>
                <ul id="itemList" class="item-list">
                    <!-- Items will be injected here via JS -->
                    <li class="empty-state">No items found. Create one above!</li>
                </ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
